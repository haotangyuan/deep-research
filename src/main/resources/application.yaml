server:
  port: 8080

spring:
  application:
    name: deep-research
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/db_deep_research?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

tavily:
  api-key: ${TAVILY_API_KEY:}
  base-url: ${TAVILY_BASE_URL:https://api.tavily.com}
  cache-enabled: ${TAVILY_CACHE_ENABLED:true}
  cache-ttl-minutes: ${TAVILY_CACHE_TTL_MINUTES:60}
  cache-max-entries: ${TAVILY_CACHE_MAX_ENTRIES:512}

research:
  agent:
    framework: ${RESEARCH_AGENT_FRAMEWORK:agentscope-java}
  observability:
    enabled: ${RESEARCH_OBSERVABILITY_ENABLED:false}
    provider: ${RESEARCH_OBSERVABILITY_PROVIDER:none}
    endpoint: ${RESEARCH_OBSERVABILITY_ENDPOINT:}
    capture-input-output: ${RESEARCH_OBSERVABILITY_CAPTURE_IO:false}
    input-output-max-chars: ${RESEARCH_OBSERVABILITY_IO_MAX_CHARS:500}
    langfuse:
      public-key: ${LANGFUSE_PUBLIC_KEY:}
      secret-key: ${LANGFUSE_SECRET_KEY:}
      ingestion-version: ${LANGFUSE_INGESTION_VERSION:4}
    studio:
      enabled: ${AGENTSCOPE_STUDIO_ENABLED:false}
      url: ${AGENTSCOPE_STUDIO_URL:http://localhost:3000}
      project: ${AGENTSCOPE_STUDIO_PROJECT:DeepResearch}
  search:
    max-results-per-query: ${RESEARCH_SEARCH_MAX_RESULTS_PER_QUERY:3}
    summary-timeout-seconds: ${RESEARCH_SEARCH_SUMMARY_TIMEOUT_SECONDS:60}
    summary-raw-content-max-chars: ${RESEARCH_SEARCH_SUMMARY_RAW_CONTENT_MAX_CHARS:12000}
    summary-fallback-content-max-chars: ${RESEARCH_SEARCH_SUMMARY_FALLBACK_CONTENT_MAX_CHARS:1200}
    summary-cache-enabled: ${RESEARCH_SEARCH_SUMMARY_CACHE_ENABLED:true}
    summary-cache-ttl-minutes: ${RESEARCH_SEARCH_SUMMARY_CACHE_TTL_MINUTES:60}
    summary-cache-max-entries: ${RESEARCH_SEARCH_SUMMARY_CACHE_MAX_ENTRIES:1024}
  async:
    max-pool-size: 10
    queue-capacity: 50
    task-timeout-minutes: 3
  budget:
    levels:
      MEDIUM:
        max-conduct-count: 2
        max-search-count: 2
        max-concurrent-units: 1
      HIGH:
        max-conduct-count: 4
        max-search-count: 3
        max-concurrent-units: 2
      ULTRA:
        max-conduct-count: 6
        max-search-count: 4
        max-concurrent-units: 3

jwt:
  secret: ${JWT_SECRET:deep-research-jwt-secret-key-must-be-at-least-32-chars}
  expiration: 10080

app:
  time-zone: ${APP_TIME_ZONE:Asia/Shanghai}

springdoc:
  api-docs:
    path: /v3/api-docs
  info:
    title: Deep Research API
    description: 基于多智能体协作的自动化深度研究平台
    version: 1.0.0

llm:
  timeout: ${LLM_TIMEOUT:300}
